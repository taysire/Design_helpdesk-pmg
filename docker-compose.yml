services:
  db:
    image: postgres:16-alpine
    container_name: pmg-helpdesk-db
    environment:
      POSTGRES_DB: pmg_helpdesk
      POSTGRES_USER: pmg
      POSTGRES_PASSWORD: pmg_dev
    ports:
      - "5433:5432"
    volumes:
      - pmg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmg -d pmg_helpdesk"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pmg-helpdesk-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pmg-helpdesk-api
    environment:
      DATABASE_URL: postgresql+psycopg://pmg:pmg_dev@db:5432/pmg_helpdesk
      REDIS_URL: redis://redis:6379/0
      API_CORS_ORIGINS: http://127.0.0.1:8888,http://localhost:8888,http://127.0.0.1:5173,http://localhost:5173
      NOTIFICATIONS_ENABLED: "true"
      NOTIFY_EMAIL_MODE: log
      NOTIFY_JIRA_ENABLED: "true"
      NOTIFY_JIRA_MODE: log
      NOTIFY_JIRA_PROJECT: PHARM
      NOTIFY_JIRA_CATEGORIES: kroll,pharmacy
      NOTIFY_SLACK_CHANNEL: "#ithelp"
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pmg_pgdata:
