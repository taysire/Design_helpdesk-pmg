<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow">Radii</div>
  <div class="row" style="gap:18px;">
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:48px; background:var(--ink-100); border:1px solid var(--border); border-radius:4px;"></div>
        <div style="font-size:11px; font-weight:600;">xs · 4px</div>
        <div style="font-size:10px; color:var(--fg-muted);">badges</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:48px; background:var(--ink-100); border:1px solid var(--border); border-radius:6px;"></div>
        <div style="font-size:11px; font-weight:600;">sm · 6px</div>
        <div style="font-size:10px; color:var(--fg-muted);">buttons/inputs</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:48px; background:var(--ink-100); border:1px solid var(--border); border-radius:8px;"></div>
        <div style="font-size:11px; font-weight:600;">md · 8px</div>
        <div style="font-size:10px; color:var(--fg-muted);">cards</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:48px; background:var(--ink-100); border:1px solid var(--border); border-radius:12px;"></div>
        <div style="font-size:11px; font-weight:600;">lg · 12px</div>
        <div style="font-size:10px; color:var(--fg-muted);">modals</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:48px; background:var(--ink-100); border:1px solid var(--border); border-radius:16px;"></div>
        <div style="font-size:11px; font-weight:600;">xl · 16px</div>
        <div style="font-size:10px; color:var(--fg-muted);">large surfaces</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:48px; background:var(--ink-100); border:1px solid var(--border); border-radius:999px;"></div>
        <div style="font-size:11px; font-weight:600;">pill · ∞</div>
        <div style="font-size:10px; color:var(--fg-muted);">status pills</div>
      </div>
  </div>
</div></body></html>
