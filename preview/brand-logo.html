<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;">
    <div style="display:flex; flex-direction:column; gap:8px;">
      <div style="background:var(--ink-900); border-radius:8px; height:96px; display:flex; align-items:center; justify-content:center;">
        <img src="../assets/logo-pmg-mark-white.png" style="height:30px; display:block;">
      </div>
      <div style="font-size:11px; font-weight:600;">On ink</div>
      <div style="font-size:10px; color:var(--fg-muted); font-family:var(--font-mono);">logo-pmg-mark-white.png</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <div style="background:white; border:1px solid var(--border); border-radius:8px; height:96px; display:flex; align-items:center; justify-content:center;">
        <img src="../assets/logo-pmg-mark.png" style="height:30px; display:block;">
      </div>
      <div style="font-size:11px; font-weight:600;">On light</div>
      <div style="font-size:10px; color:var(--fg-muted); font-family:var(--font-mono);">logo-pmg-mark.png</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <div style="background:var(--accent-600); border-radius:8px; height:96px; display:flex; align-items:center; justify-content:center;">
        <img src="../assets/logo-pmg-mark-white.png" style="height:30px; display:block;">
      </div>
      <div style="font-size:11px; font-weight:600;">On accent</div>
      <div style="font-size:10px; color:var(--fg-muted); font-family:var(--font-mono);">logo-pmg-mark-white.png</div>
    </div>
  </div>
  <div style="font-size:11px; color:var(--fg-muted); line-height:1.4;">Uniform 30px wordmark height across all surfaces. Transparent PNG marks — never embed a background.</div>
</div></body></html>
