<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div style="display:flex; gap:12px; padding:12px 14px; border:1px solid var(--border); border-radius:8px; background:white; box-shadow: 0 4px 12px rgba(11,13,16,0.08); align-items:flex-start; max-width:380px;">
    <div style="width:20px; height:20px; border-radius:50%; background:var(--success-100); color:var(--success-700); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; gap:2px;">
      <div style="font-size:13px; font-weight:600; color:var(--fg);">Ticket submitted</div>
      <div style="font-size:12px; color:var(--fg-secondary);">INC-2042 — we'll DM you on Slack when there's an update.</div>
    </div>
    <button style="background:transparent; border:0; color:var(--fg-muted); cursor:pointer; padding:0; line-height:1;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div style="display:flex; gap:12px; padding:12px 14px; border:1px solid var(--critical-100); border-radius:8px; background:var(--critical-50); align-items:flex-start; max-width:380px;">
    <div style="width:20px; height:20px; border-radius:50%; background:var(--critical-100); color:var(--critical-700); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; gap:2px;">
      <div style="font-size:13px; font-weight:600; color:var(--critical-700);">Couldn't save</div>
      <div style="font-size:12px; color:var(--fg-secondary);">Try again in a sec. We're not sure what happened.</div>
    </div>
  </div>
</div></body></html>
