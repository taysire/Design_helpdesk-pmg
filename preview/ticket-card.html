<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div style="border:1px solid var(--border); border-radius:8px; background:white; padding:14px 16px; display:flex; flex-direction:column; gap:10px;">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted);">INC-2041</span>
        <span style="display:inline-flex; align-items:center; gap:6px; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; background:#FEF3C7; color:#92400E;"><span style="width:6px; height:6px; border-radius:50%; background:#D97706;"></span>In progress</span>
        <span style="display:inline-flex; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:600; font-family:var(--font-mono); background:#FEE2E2; color:#991B1B;">P1</span>
      </div>
      <span style="font-size:11px; color:var(--fg-muted);">opened 14 min ago</span>
    </div>
    <div style="font-size:15px; font-weight:600; color:var(--fg); line-height:1.3;">KROLL unresponsive on the pharmacy floor</div>
    <div style="font-size:13px; color:var(--fg-secondary); line-height:1.5;">Pharmacists can't log in to KROLL. Vendor ticket open. ETA 30 min.</div>
    <div style="display:flex; justify-content:space-between; align-items:center; padding-top:6px; border-top:1px solid var(--ink-100);">
      <div style="display:flex; align-items:center; gap:8px;">
        <div style="width:22px; height:22px; border-radius:50%; background:linear-gradient(135deg,#16A37E,#0F8B66); color:white; font-size:10px; font-weight:600; display:flex; align-items:center; justify-content:center;">MT</div>
        <span style="font-size:12px; color:var(--fg-secondary);">m.tremblay · pharmacy systems</span>
      </div>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted);">↗ JIRA-3127</span>
    </div>
  </div>
</div></body></html>
