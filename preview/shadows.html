<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card" style="background:var(--ink-50);">
  <div class="eyebrow">Elevation — used sparingly</div>
  <div class="row" style="gap:20px;">
    
      <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="width:96px; height:56px; background:white; border:1px solid var(--border); border-radius:8px; box-shadow:0 1px 0 rgba(11,13,16,0.04);"></div>
        <div style="font-size:11px; font-weight:600;">shadow-xs</div>
        <div style="font-size:10px; color:var(--fg-muted);">sticky headers</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="width:96px; height:56px; background:white; border:1px solid var(--border); border-radius:8px; box-shadow:0 1px 2px rgba(11,13,16,0.06), 0 1px 0 rgba(11,13,16,0.02);"></div>
        <div style="font-size:11px; font-weight:600;">shadow-sm</div>
        <div style="font-size:10px; color:var(--fg-muted);">card hover</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="width:96px; height:56px; background:white; border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 12px rgba(11,13,16,0.08), 0 1px 0 rgba(11,13,16,0.02);"></div>
        <div style="font-size:11px; font-weight:600;">shadow-md</div>
        <div style="font-size:10px; color:var(--fg-muted);">popovers</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="width:96px; height:56px; background:white; border:1px solid var(--border); border-radius:8px; box-shadow:0 12px 32px rgba(11,13,16,0.12);"></div>
        <div style="font-size:11px; font-weight:600;">shadow-lg</div>
        <div style="font-size:10px; color:var(--fg-muted);">modals</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="width:96px; height:56px; background:white; border:1px solid var(--border); border-radius:8px; box-shadow:0 0 0 3px rgba(22,96,207,0.22);"></div>
        <div style="font-size:11px; font-weight:600;">shadow-focus</div>
        <div style="font-size:10px; color:var(--fg-muted);">focus ring</div>
      </div>
  </div>
</div></body></html>
