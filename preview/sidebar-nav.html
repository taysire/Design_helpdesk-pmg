<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.nav-item { display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:6px; font-size:13px; color:var(--fg-secondary); cursor:pointer; }
.nav-item:hover { background: var(--ink-100); color: var(--fg); }
.nav-item.active { background: var(--accent-50); color: var(--fg); font-weight:600; }
.nav-item .icon { width:16px; height:16px; display:inline-block; }
.nav-item .count { margin-left:auto; font-size:11px; color: var(--fg-muted); font-family: var(--font-mono); }
.nav-item.active .count { color: var(--accent-700); }
.nav-section { padding: 8px 10px 4px; font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color: var(--fg-muted); }
</style>
</head><body>
<div class="card" style="padding:16px; gap:0;">
  <div style="background:white; border:1px solid var(--border); border-radius:8px; padding:8px; width:240px;">
    <div class="nav-item"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>Home</div>
    <div class="nav-item active"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18"/></svg>My tickets<span class="count">7</span></div>
    <div class="nav-item"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>All tickets<span class="count">128</span></div>
    <div class="nav-item"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Waiting on me<span class="count">3</span></div>
    <div class="nav-section">Categories</div>
    <div class="nav-item"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="9" width="20" height="9" rx="2"/><path d="M6 9V4h12v5M6 18v2h12v-2"/></svg>Hardware</div>
    <div class="nav-item"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Access requests</div>
  </div>
</div></body></html>
