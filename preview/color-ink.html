<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow">Ink scale — neutrals (slightly warm)</div>
  <div style="display:grid; grid-template-columns:repeat(11, 1fr); gap:6px;">
    <div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:54px; background:#FFFFFF; border-radius:6px; border:1px solid var(--border);"></div>
        <div style="font-size:10px; font-weight:600; line-height:1;">0</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#FFFFFF</div>
      </div><div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:54px; background:#F6F7F8; border-radius:6px; border:1px solid var(--border);"></div>
        <div style="font-size:10px; font-weight:600; line-height:1;">50</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#F6F7F8</div>
      </div><div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:54px; background:#ECEEF1; border-radius:6px; border:1px solid var(--border);"></div>
        <div style="font-size:10px; font-weight:600; line-height:1;">100</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#ECEEF1</div>
      </div><div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:54px; background:#E8EBEE; border-radius:6px; border:1px solid var(--border);"></div>
        <div style="font-size:10px; font-weight:600; line-height:1;">150</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#E8EBEE</div>
      </div><div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:54px; background:#DDE1E5; border-radius:6px; border:1px solid var(--border);"></div>
        <div style="font-size:10px; font-weight:600; line-height:1;">200</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#DDE1E5</div>
      </div><div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:54px; background:#B7BDC4; border-radius:6px; "></div>
        <div style="font-size:10px; font-weight:600; line-height:1;">300</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#B7BDC4</div>
      </div><div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:54px; background:#828A94; border-radius:6px; "></div>
        <div style="font-size:10px; font-weight:600; line-height:1;">400</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#828A94</div>
      </div><div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:54px; background:#5B636E; border-radius:6px; "></div>
        <div style="font-size:10px; font-weight:600; line-height:1;">500</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#5B636E</div>
      </div><div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:54px; background:#2A2F36; border-radius:6px; "></div>
        <div style="font-size:10px; font-weight:600; line-height:1;">700</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#2A2F36</div>
      </div><div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:54px; background:#0B0D10; border-radius:6px; "></div>
        <div style="font-size:10px; font-weight:600; line-height:1;">900</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#0B0D10</div>
      </div><div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:54px; background:#07090C; border-radius:6px; "></div>
        <div style="font-size:10px; font-weight:600; line-height:1;">1000</div>
        <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#07090C</div>
      </div>
  </div>
</div></body></html>
