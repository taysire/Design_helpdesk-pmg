<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow">Semantic — status colors</div>
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px;">
    
      <div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:48px; background:#DC2626; border-radius:6px;"></div>
        <div style="height:18px; background:#FEE2E2; border-radius:4px;"></div>
        <div style="font-size:11px; font-weight:600;">Critical</div>
        <div style="font-size:10px; color:var(--fg-muted); font-family:var(--font-mono);">#DC2626</div>
        <div style="font-size:10px; color:var(--fg-muted);">P1 · down</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:48px; background:#D97706; border-radius:6px;"></div>
        <div style="height:18px; background:#FEF3C7; border-radius:4px;"></div>
        <div style="font-size:11px; font-weight:600;">Warning</div>
        <div style="font-size:10px; color:var(--fg-muted); font-family:var(--font-mono);">#D97706</div>
        <div style="font-size:10px; color:var(--fg-muted);">Pending</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:48px; background:#2563EB; border-radius:6px;"></div>
        <div style="height:18px; background:#DBEAFE; border-radius:4px;"></div>
        <div style="font-size:11px; font-weight:600;">Info</div>
        <div style="font-size:10px; color:var(--fg-muted); font-family:var(--font-mono);">#2563EB</div>
        <div style="font-size:10px; color:var(--fg-muted);">In progress</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <div style="height:48px; background:#16A34A; border-radius:6px;"></div>
        <div style="height:18px; background:#DCFCE7; border-radius:4px;"></div>
        <div style="font-size:11px; font-weight:600;">Success</div>
        <div style="font-size:10px; color:var(--fg-muted); font-family:var(--font-mono);">#16A34A</div>
        <div style="font-size:10px; color:var(--fg-muted);">Resolved</div>
      </div>
  </div>
</div></body></html>
