<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.field { display:flex; flex-direction:column; gap:6px; }
.field label { font-size:12px; font-weight:600; color:var(--fg); }
.field .help { font-size:11px; color:var(--fg-muted); }
.input { font-family:inherit; font-size:14px; padding:9px 12px; border-radius:6px; border:1px solid var(--border); background:white; color:var(--fg); outline:none; transition: all 120ms; }
.input::placeholder { color:var(--fg-muted); }
.input.focus { border-color: var(--accent-600); box-shadow: 0 0 0 3px rgba(22,96,207,0.22); }
.input.error { border-color: var(--critical-600); }
.input:disabled { background: var(--ink-50); color: var(--fg-secondary); cursor: not-allowed; }
.select { background-image: linear-gradient(45deg, transparent 50%, var(--fg-secondary) 50%), linear-gradient(135deg, var(--fg-secondary) 50%, transparent 50%); background-position: calc(100% - 14px) 14px, calc(100% - 9px) 14px; background-size: 5px 5px; background-repeat: no-repeat; padding-right: 28px; appearance:none; }
.textarea { font-family:inherit; font-size:14px; padding:10px 12px; border-radius:6px; border:1px solid var(--border); background:white; color:var(--fg); outline:none; resize:vertical; line-height:1.5; min-height: 64px; }
.btn { font-family:inherit; font-size:13px; font-weight:500; padding:8px 14px; border-radius:6px; border:1px solid transparent; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
.btn-primary { background: var(--accent-600); color:white; }
.btn-secondary { background: white; color: var(--fg); border-color: var(--border-strong); }
.urgency { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.urgency button { padding:8px 10px; border-radius:6px; border:1px solid var(--border); background:white; cursor:pointer; font-family:inherit; font-size:12px; font-weight:500; display:flex; flex-direction:column; gap:2px; align-items:flex-start; text-align:left; }
.urgency button.on { border-color: var(--accent-600); background: var(--accent-50); }
.urgency button .lbl { font-weight:600; color:var(--fg); display:flex; align-items:center; gap:6px; }
.urgency button .lbl::before { content:''; width:8px; height:8px; border-radius:2px; background: var(--c, var(--ink-300)); }
.urgency button .desc { font-size:10px; color:var(--fg-muted); }
.attach { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:6px; border:1px dashed var(--border-strong); background:white; cursor:pointer; font-size:12px; color:var(--fg-secondary); }
</style>
</head><body>
<div class="card" style="gap:14px;">
  <div class="field">
    <label>What's going on?</label>
    <input class="input" placeholder="A short headline — like 'printer offline on 3rd floor'" value="Printer on 3rd floor won't print">
  </div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
    <div class="field">
      <label>What kind of thing is it?</label>
      <select class="input select"><option>Hardware — printer</option></select>
    </div>
    <div class="field">
      <label>Where?</label>
      <input class="input" value="HQ — 3rd floor" disabled>
      <span class="help">We filled this in from your profile.</span>
    </div>
  </div>

  <div class="field">
    <label>How urgent is it?</label>
    <div class="urgency">
      <button type="button"><span class="lbl" style="--c:#DC2626;">P1</span><span class="desc">Down for everyone</span></button>
      <button type="button"><span class="lbl" style="--c:#D97706;">P2</span><span class="desc">Down for my team</span></button>
      <button type="button" class="on"><span class="lbl" style="--c:#CA8A04;">P3</span><span class="desc">Slowing me down</span></button>
      <button type="button"><span class="lbl" style="--c:#5B636E;">P4</span><span class="desc">When you can</span></button>
    </div>
  </div>

  <div class="field">
    <label>Tell us more</label>
    <textarea class="textarea focus" style="border-color:var(--accent-600); box-shadow:0 0 0 3px rgba(22,96,207,0.22);" rows="2">Konica shows 'offline' on Windows. Panel says ready. Power-cycled — same thing.</textarea>
    <span class="help" style="color:var(--accent-700);">Screenshots help — drop one in or use the paperclip below.</span>
  </div>

  <div class="row" style="justify-content:space-between; align-items:center;">
    <span class="attach">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      Attach a screenshot
    </span>
    <div class="row" style="gap:8px;">
      <button class="btn btn-secondary">Save draft</button>
      <button class="btn btn-primary">Send to IT</button>
    </div>
  </div>
</div></body></html>
