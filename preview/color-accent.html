<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="eyebrow">Accent — PMG blue</div>
  <div style="display:grid; grid-template-columns:repeat(7,1fr); gap:8px;">
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div style="height:62px; background:#EDF4FE; border-radius:6px; border:1px solid var(--border);"></div>
      <div style="font-size:10px; font-weight:600; line-height:1;">accent-50</div>
      <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#EDF4FE</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div style="height:62px; background:#D6E4FD; border-radius:6px; border:1px solid var(--border);"></div>
      <div style="font-size:10px; font-weight:600; line-height:1;">accent-100</div>
      <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#D6E4FD</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div style="height:62px; background:#84B2F4; border-radius:6px; border:1px solid var(--border);"></div>
      <div style="font-size:10px; font-weight:600; line-height:1;">accent-300</div>
      <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#84B2F4</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div style="height:62px; background:#2E7AE6; border-radius:6px;"></div>
      <div style="font-size:10px; font-weight:600; line-height:1;">accent-500</div>
      <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#2E7AE6</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div style="height:62px; background:#1660CF; border-radius:6px; display:flex; align-items:flex-end; padding:6px;">
        <div style="color:white; font-size:9px; font-weight:600; letter-spacing:0.08em;">PRIMARY</div>
      </div>
      <div style="font-size:10px; font-weight:600; line-height:1;">accent-600</div>
      <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#1660CF</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div style="height:62px; background:#0B4AA8; border-radius:6px;"></div>
      <div style="font-size:10px; font-weight:600; line-height:1;">accent-700</div>
      <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#0B4AA8</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div style="height:62px; background:#082E66; border-radius:6px;"></div>
      <div style="font-size:10px; font-weight:600; line-height:1;">accent-900</div>
      <div style="font-family:var(--font-mono); font-size:9px; color:var(--fg-muted); line-height:1;">#082E66</div>
    </div>
  </div>
  <div style="font-size:11px; color:var(--fg-muted); line-height:1.4;">Used for primary CTAs, links, focus rings, the brand mark, and selected nav state — never for decoration.</div>
</div></body></html>
